<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script defer src="js/profile.js"></script>
    <script defer src="js/history.js"></script>
    <script defer src="js/init.js"></script>
    <script src="js/auth.js"></script>
    <title>User Profile</title>
</head>

<body>

    <header class="header" id="header"></header>

    <div class="container">
        <h2 id="userEmail">Guest</h2>
        <script>userEmail.textContent = JSON.parse(localStorage.getItem("user"))?.email;</script>
        <button onclick="logout()">Logout</button>
        <button onclick="showHistory()">History</button>
        <h3>History</h3>
        <div id="historyContainer"></div>
        <h3>Rented Properties</h3>
        <div id="rentedProperties" class="grid"></div>
        <h3>Available Properties</h3>
        <div id="availableProperties" class="grid"></div>
    </div>

</body>

</html>
