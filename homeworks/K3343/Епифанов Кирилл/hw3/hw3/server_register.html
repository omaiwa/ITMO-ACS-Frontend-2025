<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
        crossorigin="anonymous"></script>
    <script defer src="js/init.js"></script>


    <title>Register</title>

    <style>
        .btn-primary {
            --bs-btn-color: #fff;
            --bs-btn-bg: #485972;
            --bs-btn-border-color: #485972;
            --bs-btn-hover-color: #fff;
            --bs-btn-hover-bg: #566b89;
            --bs-btn-hover-border-color: #566b89;
            --bs-btn-focus-shadow-rgb: 49, 132, 253;
            --bs-btn-active-color: #fff;
            --bs-btn-active-bg: #485972;
            --bs-btn-active-border-color: #485972;
            --bs-btn-active-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.125);
            --bs-btn-disabled-color: #fff;
            --bs-btn-disabled-bg: #354154;
            --bs-btn-disabled-border-color: #354154;
        }
    </style>
</head>

<body>
    <header class="header" id="header"></header>

    <div class="container mt-5">
        <form onsubmit="register(event)">
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" name="email" aria-describedby="emailHelp"
                    autocomplete="off">
                <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" name="password" id="password" autocomplete="off">
            </div>
            <div class="mb-3">
                <label for="firstName" class="form-label">Name</label>
                <input type="text" class="form-control" name="firstName" id="firstName" autocomplete="off">
            </div>
            <div class="mb-3">
                <label for="lastName" class="form-label">Surname</label>
                <input type="text" class="form-control" name="lastName" id="lastName" autocomplete="off">
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>

    <script>
        function checkAuth() {
            if (localStorage.accessToken) {
                window.location.href = "index.html"
            }
        }

        async function register(event) {
            event.preventDefault()

            const formData = new FormData(event.target)

            const registerData = {}

            formData.forEach((value, label) => registerData[label] = value)

            console.log('register data', registerData)

            const response = await fetch('http://localhost:3000/signup', {
                method: "POST",
                body: JSON.stringify(registerData),
                headers: {
                    'Content-Type': 'application/json'
                }
            })

            if (!response.ok) {
                alert("Error!");
                return
            }

            console.log('response', response)

            const responseJson = await response.json()

            const { accessToken, user } = responseJson

            console.log('response', responseJson)

            localStorage.accessToken = accessToken
            localStorage.user = JSON.stringify(user)

            alert("Registration successful!");

            localStorage.setItem("loggedIn", "true");
            localStorage.setItem("currentUser", JSON.stringify(user.email));
            localStorage.setItem("rented", JSON.stringify([]));

            window.location.href = "index.html"
        }

        document.addEventListener('DOMContentLoaded', () => checkAuth())
    </script>
</body>

</html>
